- name: Check Java Version
  shell: java -version 2>&1
  register: java_version
  ignore_errors: yes

- name: Install Java 21
  apt:
    name: openjdk-21-jdk
    state: present
    update_cache: yes
  when: java_version.rc != 0

- name: Install required packages
  apt:
    name:
      - curl
      - wget
      - gnupg
      - unzip
      - software-properties-common
    state: present
    update_cache: yes

- name: Download Jenkins GPG Key
  shell: |
    curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key | \
    gpg --batch --yes --dearmor -o /usr/share/keyrings/jenkins-keyring.gpg
    chmod 644 /usr/share/keyrings/jenkins-keyring.gpg
  args:
    executable: /bin/bash

- name: Add Jenkins Repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg trusted=yes] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Jenkins
  apt:
    name: jenkins
    state: present

- name: Create Jenkins systemd override directory
  file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory
    mode: '0755'

- name: Configure JAVA_HOME for Jenkins
  copy:
    dest: /etc/systemd/system/jenkins.service.d/override.conf
    content: |
      [Service]
      Environment="JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Enable and Start Jenkins
  systemd:
    name: jenkins
    state: started
    enabled: yes

- name: Install Git
  apt:
    name: git
    state: present

- name: Add NodeSource Repository
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
  args:
    executable: /bin/bash

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: yes

- name: Install AWS CLI v2
  shell: |
    curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
    unzip -o /tmp/awscliv2.zip -d /tmp
    /tmp/aws/install --update
  args:
    executable: /bin/bash

- name: Install Docker
  apt:
    name: docker.io
    state: present
    update_cache: yes

- name: Enable and Start Docker
  service:
    name: docker
    state: started
    enabled: yes

- name: Add Jenkins user to Docker group
  user:
    name: jenkins
    groups: docker
    append: yes

- name: Restart Jenkins
  systemd:
    name: jenkins
    state: restarted

- name: Verify Installed Components
  shell: |
    java -version
    git --version
    node --version
    aws --version
    docker --version
  register: versions

- name: Display Versions
  debug:
    var: versions.stdout_lines


