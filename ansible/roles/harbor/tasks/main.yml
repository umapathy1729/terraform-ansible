---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install Docker dependencies
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Install Docker
  apt:
    name:
      - docker.io
    state: present

- name: Start and enable Docker
  service:
    name: docker
    state: started
    enabled: yes

- name: Install Docker Compose
  shell: |
    curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose
    chmod +x /usr/local/bin/docker-compose
    ln -sf /usr/local/bin/docker-compose /usr/bin/docker-compose
  args:
    creates: /usr/local/bin/docker-compose

- name: Verify Docker Compose
  command: /usr/local/bin/docker-compose --version
  register: compose_version

- name: Show Docker Compose Version
  debug:
    var: compose_version.stdout

- name: Download Harbor
  get_url:
    url: https://github.com/goharbor/harbor/releases/download/v2.10.0/harbor-online-installer-v2.10.0.tgz
    dest: /opt/harbor-installer.tgz
    timeout: 120

- name: Extract Harbor
  unarchive:
    src: /opt/harbor-installer.tgz
    dest: /opt/
    remote_src: yes

- name: Create Harbor Log Directory
  file:
    path: /var/log/harbor
    state: directory
    mode: "0755"

- name: Configure Harbor
  shell: |
    cd /opt/harbor
    cp harbor.yml.tmpl harbor.yml
    sed -i 's/hostname: reg.mydomain.com/hostname: 13.239.242.186/' harbor.yml
    sed -i '/^https:/,/^[^ ]/{ /^https:/d; /certificate:/d; /private_key:/d }' harbor.yml
    sed -i 's/  port: 443//' harbor.yml
  args:
    executable: /bin/bash

- name: Install Harbor
  shell: |
    cd /opt/harbor
    /usr/local/bin/docker-compose down 2>/dev/null || true
    ./install.sh
  args:
    executable: /bin/bash
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin"
  async: 600
  poll: 30
